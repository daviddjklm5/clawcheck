name: Text Encoding Check

on:
  push:
  pull_request:

jobs:
  encoding-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Check repository text encoding
        run: python automation/scripts/check_text_encoding.py
